name: promaja
description: Weather app made in Flutter.
publish_to: 'none'
version: 3.1.5+315

#
# DEPLOYING APP
# 1. `pubspec.yaml` -> Bump version number
# 2. `release_notes.txt` -> Update changelog for all languages
# 3. `default.txt` -> Update changelog for all languages
#

#
# Android
# `cd android/ && fastlane play_store_release`
#
# GitHub Releases
# `cd android/ && fastlane github_release`
#
# iOS
# `cd ios/ && fastlane app_store_release`
#

environment:
  sdk: 3.12.2

dependencies:
  flutter:
    sdk: flutter

  background_fetch: 1.7.0
  dio: 5.9.2
  easy_localization: 3.0.8
  envied: 1.3.6
  flutter_animate: 4.5.2
  flutter_card_swiper: 7.2.0
  flutter_colorpicker: 1.1.0
  flutter_displaymode: 0.7.0
  flutter_local_notifications: 22.0.1
  flutter_native_splash: 2.4.8
  flutter_swipe_action_cell: 3.1.8
  flutter_web_browser: 0.17.3
  geolocator: 14.0.3
  get_it: 9.2.1
  hive_ce: 2.19.3
  hive_ce_flutter: 2.3.4
  home_widget: 0.9.3
  intl: 0.20.2
  logger: 2.7.0
  smooth_page_indicator: 2.0.1
  url_launcher: 6.3.2
  watch_it: 2.4.2

dev_dependencies:
  build_runner: 2.15.0
  envied_generator: 1.3.6
  flutter_launcher_icons: 0.14.4
  hive_ce_generator: 1.11.2

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/
    - assets/icons/
    - assets/translations/
    - assets/weather/
  fonts:
    - family: ProductSans
      fonts:
        - asset: assets/fonts/ProductSans-Thin.ttf
          weight: 100
        - asset: assets/fonts/ProductSans-Light.ttf
          weight: 300
        - asset: assets/fonts/ProductSans-Regular.ttf
          weight: 500
        - asset: assets/fonts/ProductSans-Medium.ttf
          weight: 600
        - asset: assets/fonts/ProductSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/ProductSans-Black.ttf
          weight: 900

# Run code generation - `dart run build_runner build -d`

# Configuration for 'flutter_launcher_icons'
# Run icon generation with 'dart run flutter_launcher_icons:main'
flutter_launcher_icons:
  image_path_android: 'assets/icon.png'
  image_path_ios: 'assets/icon.png'
  android: true
  ios: true
  adaptive_icon_background: "assets/background.png"
  adaptive_icon_foreground: "assets/splash_icon.png"
  adaptive_icon_foreground_inset: 16
  adaptive_icon_monochrome: "assets/monochrome.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: '#17181E'
  image_path_ios_tinted_grayscale: "assets/icon_tinted.png"
  web:
    generate: true
    image_path: 'assets/icon.png'
    background_color: '#17181E'
    theme_color: '#17181E'
  windows:
    generate: true
    image_path: 'assets/icon.png'
    icon_size: 48
  macos:
    generate: true
    image_path: 'assets/icon.png'

# Configuration for 'flutter_native_splash'
# Run splash screen generation with 'dart run flutter_native_splash:create'
flutter_native_splash:
  background_image: 'assets/splash.png'
  android_12:
    image: 'assets/splash_icon.png'
    color: '#17181E'
    image_dark: 'assets/splash_icon.png'
    color_dark: '#17181E'
